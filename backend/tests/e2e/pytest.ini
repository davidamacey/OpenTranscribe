[pytest]
# E2E Test Configuration

# Base URL for frontend (can be overridden with --base-url)
base_url = http://localhost:5173

# Browser options
# Run headless by default, use --headed for visible browser
addopts = --browser chromium

# Slow down operations for debugging (milliseconds)
# Uncomment for debugging:
# --slowmo 100

# Screenshot on failure
# --screenshot only-on-failure

# Video recording (off by default, can be on/retain-on-failure)
# --video off

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    auth: marks tests related to authentication (LDAP, Keycloak, PKI login flows)
    smoke: marks tests for smoke testing
    pki: PKI certificate authentication tests (requires RUN_PKI_E2E=true)
