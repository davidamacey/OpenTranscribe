# OpenTranscribe Base Configuration
# This file contains common configuration for all environments
#
# Usage:
#   Development:   docker compose up (auto-loads docker-compose.override.yml)
#   Production:    docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#   Offline:       docker compose -f docker-compose.yml -f docker-compose.offline.yml up

services:
  postgres:
    container_name: opentranscribe-postgres
    image: postgres:17.5-alpine
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    # Performance tuning for transcription workloads (2500+ files, 1M+ segments)
    # All values configurable via .env, defaults tuned for 4-8GB RAM + SSD storage
    command: >
      postgres
      -c shared_buffers=${PG_SHARED_BUFFERS:-256MB}
      -c effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-1GB}
      -c work_mem=${PG_WORK_MEM:-16MB}
      -c maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-128MB}
      -c random_page_cost=${PG_RANDOM_PAGE_COST:-1.1}
      -c effective_io_concurrency=${PG_EFFECTIVE_IO_CONCURRENCY:-200}
      -c max_connections=${PG_MAX_CONNECTIONS:-200}
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
      -c default_statistics_target=100
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "${POSTGRES_PORT:-5176}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    container_name: opentranscribe-minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-5178}:9000"
      - "${MINIO_CONSOLE_PORT:-5179}:9001"
    environment:
      # Server-side encryption at rest (AES-256-GCM)
      # Auto-encrypts all new objects. Existing unencrypted objects remain readable.
      # Key format: <key-name>:<base64-encoded-32-byte-key>
      # Generate with: echo "opentranscribe-key:$(openssl rand -base64 32)"
      - MINIO_KMS_SECRET_KEY=${MINIO_KMS_SECRET_KEY:-}
      - MINIO_KMS_AUTO_ENCRYPTION=${MINIO_KMS_AUTO_ENCRYPTION:-off}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 10s
      retries: 5

  redis:
    container_name: opentranscribe-redis
    image: redis:8.2.2-alpine3.22
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    ports:
      - "${REDIS_PORT:-5177}:6379"
    volumes:
      - redis_data:/data
    # Use password if REDIS_PASSWORD is set in .env
    command: >
      sh -c "if [ -n \"$REDIS_PASSWORD\" ]; then
        redis-server --requirepass \"$REDIS_PASSWORD\";
      else
        redis-server;
      fi"
    healthcheck:
      test: >
        sh -c "if [ -n \"$REDIS_PASSWORD\" ]; then
          redis-cli -a \"$REDIS_PASSWORD\" ping;
        else
          redis-cli ping;
        fi"
      interval: 5s
      timeout: 30s
      retries: 50

  opensearch:
    container_name: opentranscribe-opensearch
    image: opensearchproject/opensearch:3.4.0
    restart: always
    security_opt:
      - no-new-privileges:true
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - DISABLE_SECURITY_PLUGIN=true
      # ML Commons settings for neural search (CPU-based embedding inference)
      - plugins.ml_commons.only_run_on_ml_node=false
      - plugins.ml_commons.native_memory_threshold=99
      - plugins.ml_commons.model_access_control_enabled=false
      - plugins.ml_commons.allow_registering_model_via_url=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch_data:/usr/share/opensearch/data
      # Pre-downloaded neural search models for offline deployments
      - ${MODEL_CACHE_DIR:-./models}/opensearch-ml:/ml-models:ro
    ports:
      - "${OPENSEARCH_PORT:-5180}:9200"
      - "${OPENSEARCH_ADMIN_PORT:-5181}:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://localhost:9200 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20

  backend:
    container_name: opentranscribe-backend
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    # Backend handles API requests only - except the search embedding model
    # which is loaded for query-time vector search. AI processing in celery-worker.
    volumes:
      - ./VERSION:/app/VERSION:ro
      - ${MODEL_CACHE_DIR:-./models}/sentence-transformers:/home/appuser/.cache/sentence-transformers
    ports:
      - "${BACKEND_PORT:-5174}:8080"
    environment:
      # Internal Docker network settings (hardcoded for service-to-service communication)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      # Container paths (hardcoded for internal use)
      - MODELS_DIRECTORY=/app/models
      - MODEL_BASE_DIR=/app/models
      - TEMP_DIR=/app/temp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  celery-worker:
    container_name: opentranscribe-celery-worker
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    command: celery -A app.core.celery worker --loglevel=info -Q gpu --concurrency=${GPU_DEFAULT_CONCURRENCY:-1} --max-tasks-per-child=${GPU_MAX_TASKS:-100000} --hostname gpu-transcription@%h -E
    # GPU configuration is provided by docker-compose.gpu.yml overlay
    # when NVIDIA GPU is detected (automatically handled by opentr.sh)
    # This allows the base file to work on macOS and CPU-only Linux systems
    volumes:
      # Model cache directories - must be owned by UID 1000 on host
      - ${MODEL_CACHE_DIR:-./models}/huggingface:/home/appuser/.cache/huggingface
      - ${MODEL_CACHE_DIR:-./models}/torch:/home/appuser/.cache/torch
      - ${MODEL_CACHE_DIR:-./models}/nltk_data:/home/appuser/.cache/nltk_data
      - ${MODEL_CACHE_DIR:-./models}/sentence-transformers:/home/appuser/.cache/sentence-transformers
    environment:
      # Internal Docker network settings (same as backend)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - MODELS_DIRECTORY=/app/models
      - MODEL_BASE_DIR=/app/models
      - TEMP_DIR=/app/temp
      # Per-container batch size override (default worker is typically a smaller GPU)
      - BATCH_SIZE=${GPU_DEFAULT_BATCH_SIZE:-auto}
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping -d gpu-transcription@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-download-worker:
    container_name: opentranscribe-celery-download-worker
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    command: celery -A app.core.celery worker --loglevel=info -Q download --concurrency=${DOWNLOAD_CONCURRENCY:-3} --max-tasks-per-child=${DOWNLOAD_MAX_TASKS:-10} --hostname media-downloader@%h -E
    volumes:
      - ${MODEL_CACHE_DIR:-./models}/huggingface:/home/appuser/.cache/huggingface
      - ${MODEL_CACHE_DIR:-./models}/torch:/home/appuser/.cache/torch
    environment:
      # Internal Docker network settings (same as backend)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - TEMP_DIR=/app/temp
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping -d media-downloader@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-cpu-worker:
    container_name: opentranscribe-celery-cpu-worker
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    command: celery -A app.core.celery worker --loglevel=info -Q cpu,utility --concurrency=8 --max-tasks-per-child=20 --hostname cpu-processor@%h -E
    environment:
      # Internal Docker network settings (same as backend)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - TEMP_DIR=/app/temp
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping -d cpu-processor@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-nlp-worker:
    container_name: opentranscribe-celery-nlp-worker
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    command: celery -A app.core.celery worker --loglevel=info -Q nlp,celery --concurrency=${NLP_CONCURRENCY:-4} --max-tasks-per-child=${NLP_MAX_TASKS:-50} --hostname ai-nlp@%h -E
    environment:
      # Internal Docker network settings (same as backend)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - TEMP_DIR=/app/temp
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping -d ai-nlp@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - postgres
      - redis
      - minio
      - opensearch

  celery-embedding-worker:
    container_name: opentranscribe-celery-embedding-worker
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    # Dedicated embedding worker: concurrency=1 keeps one model loaded in memory.
    # Same pattern as GPU worker - sequential processing, model stays warm.
    # High max-tasks-per-child avoids model reload overhead.
    command: celery -A app.core.celery worker --loglevel=info -Q embedding --concurrency=1 --max-tasks-per-child=500 --hostname search-indexer@%h -E
    volumes:
      - ${MODEL_CACHE_DIR:-./models}/sentence-transformers:/home/appuser/.cache/sentence-transformers
    environment:
      # Internal Docker network settings (same as backend)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - TEMP_DIR=/app/temp
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping -d search-indexer@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    container_name: opentranscribe-celery-beat
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    command: celery -A app.core.celery beat --loglevel=info
    environment:
      # Internal Docker network settings (same as backend)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - TEMP_DIR=/app/temp
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import os,time; exit(0 if os.path.exists(\"/app/celerybeat-schedule\") and time.time()-os.path.getmtime(\"/app/celerybeat-schedule\")<300 else 1)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  # GPU Scaled Worker - Base definition
  # Activated only with --gpu-scale flag via docker-compose.gpu-scale.yml overlay
  # GPU configuration (deploy.resources.reservations) is provided by gpu-scale.yml
  # Image/build/volumes provided by override.yml (dev) or prod.yml/offline.yml
  celery-worker-gpu-scaled:
    container_name: ${COMPOSE_PROJECT_NAME:-opentranscribe}-celery-worker-gpu-scaled
    profiles:
      - gpu-scale  # Only activated with --gpu-scale flag
    scale: 0  # Disabled by default, gpu-scale.yml sets scale: 1
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    environment:
      # Internal Docker network settings (same as other workers)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - MODELS_DIRECTORY=/app/models
      - MODEL_BASE_DIR=/app/models
      - TEMP_DIR=/app/temp
    tmpfs:
      - /app/temp:noexec,nosuid,size=20g,mode=1777
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    container_name: opentranscribe-frontend
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    # Note: ports, healthcheck, and NODE_ENV defined in override files (dev vs prod)
    depends_on:
      backend:
        condition: service_healthy

  flower:
    container_name: opentranscribe-flower
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    command: >
      python -m celery -A app.core.celery flower
      --port=5555
      --url_prefix=${FLOWER_URL_PREFIX:-flower}
      --persistent=True
      --db=/app/flower.db
      --broker=redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
      --max_tasks=10000
      --natural_time=True
      --auto_refresh=True
      --tasks_columns=name,uuid,state,received,started,runtime,worker,args
      --purge_offline_workers=600
      --queues=gpu,download,cpu,nlp,embedding,utility
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-flower}
    ports:
      - "${FLOWER_PORT:-5175}:5555"
    environment:
      - CELERY_BROKER_URL=redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
      - FLOWER_USER=${FLOWER_USER:-admin}
      - FLOWER_PASSWORD=${FLOWER_PASSWORD:-flower}
      - TEMP_DIR=/app/temp
    depends_on:
      - redis
      - celery-worker
    volumes:
      # Flower only needs persistent database for monitoring, not AI models
      - flower_data:/app

volumes:
  postgres_data:
  minio_data:
  redis_data:
  opensearch_data:
  flower_data:

networks:
  default:
    driver: bridge
