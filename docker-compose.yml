# OpenTranscribe Base Configuration
# This file contains common configuration for all environments
#
# Usage:
#   Development:   docker compose up (auto-loads docker-compose.override.yml)
#   Production:    docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#   Offline:       docker compose -f docker-compose.yml -f docker-compose.offline.yml up

services:
  postgres:
    container_name: opentranscribe-postgres
    image: postgres:17.5-alpine
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    # Performance tuning for transcription workloads (2500+ files, 1M+ segments)
    # All values configurable via .env, defaults tuned for 4-8GB RAM + SSD storage
    command: >
      postgres
      -c shared_buffers=${PG_SHARED_BUFFERS:-256MB}
      -c effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-1GB}
      -c work_mem=${PG_WORK_MEM:-16MB}
      -c maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-128MB}
      -c random_page_cost=${PG_RANDOM_PAGE_COST:-1.1}
      -c effective_io_concurrency=${PG_EFFECTIVE_IO_CONCURRENCY:-200}
      -c max_connections=${PG_MAX_CONNECTIONS:-200}
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
      -c default_statistics_target=100
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "${POSTGRES_PORT:-5176}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    container_name: opentranscribe-minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-5178}:9000"
      - "${MINIO_CONSOLE_PORT:-5179}:9001"
    environment:
      # Server-side encryption at rest (AES-256-GCM)
      # Auto-encrypts all new objects. Existing unencrypted objects remain readable.
      # Key format: <key-name>:<base64-encoded-32-byte-key>
      # Generate with: echo "opentranscribe-key:$(openssl rand -base64 32)"
      - MINIO_KMS_SECRET_KEY=${MINIO_KMS_SECRET_KEY:-}
      - MINIO_KMS_AUTO_ENCRYPTION=${MINIO_KMS_AUTO_ENCRYPTION:-off}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 10s
      retries: 5

  redis:
    container_name: opentranscribe-redis
    image: redis:8.2.2-alpine3.22
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    ports:
      - "${REDIS_PORT:-5177}:6379"
    volumes:
      - redis_data:/data
    # Use password if REDIS_PASSWORD is set in .env
    command: >
      sh -c "if [ -n \"$REDIS_PASSWORD\" ]; then
        redis-server --requirepass \"$REDIS_PASSWORD\";
      else
        redis-server;
      fi"
    healthcheck:
      test: >
        sh -c "if [ -n \"$REDIS_PASSWORD\" ]; then
          redis-cli -a \"$REDIS_PASSWORD\" ping;
        else
          redis-cli ping;
        fi"
      interval: 5s
      timeout: 30s
      retries: 50

  opensearch:
    container_name: opentranscribe-opensearch
    image: opensearchproject/opensearch:3.4.0
    restart: always
    security_opt:
      - no-new-privileges:true
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      # Neural search requires substantially more heap than the 1 GB
      # OpenSearch default. The ML plugin sizes its `neural_search` JVM
      # circuit breaker at ~10% of total heap, so:
      #   1 GB heap → 102 MB breaker → all models fail to load
      #   2 GB heap → 204 MB breaker → all-MiniLM-L6-v2 (240 MB) marginal
      #   4 GB heap → 410 MB breaker → comfortable for all default models
      # 4 GB is the recommended minimum once neural search is enabled.
      # Override with OPENSEARCH_JAVA_OPTS env var (e.g. for systems with
      # limited RAM, set -Xms2g -Xmx2g and use a smaller embedding model
      # like all-MiniLM-L6-v2 explicitly).
      - "OPENSEARCH_JAVA_OPTS=${OPENSEARCH_JAVA_OPTS:--Xms4g -Xmx4g}"
      - DISABLE_SECURITY_PLUGIN=true
      # ML Commons settings for neural search (CPU-based embedding inference)
      - plugins.ml_commons.only_run_on_ml_node=false
      - plugins.ml_commons.native_memory_threshold=99
      - plugins.ml_commons.model_access_control_enabled=false
      - plugins.ml_commons.allow_registering_model_via_url=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch_data:/usr/share/opensearch/data
      # Pre-downloaded neural search models for offline deployments
      - ${MODEL_CACHE_DIR:-./models}/opensearch-ml:/ml-models:ro
    ports:
      - "${OPENSEARCH_PORT:-5180}:9200"
      - "${OPENSEARCH_ADMIN_PORT:-5181}:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://localhost:9200 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20

  backend:
    container_name: opentranscribe-backend
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    # Backend handles API requests only - except the search embedding model
    # which is loaded for query-time vector search. AI processing in celery-worker.
    volumes:
      - ${MODEL_CACHE_DIR:-./models}/sentence-transformers:/home/appuser/.cache/sentence-transformers
      - ${MODEL_CACHE_DIR:-./models}/nltk_data:/home/appuser/.cache/nltk_data
    ports:
      - "${BACKEND_PORT:-5174}:8080"
    environment:
      # Internal Docker network settings (hardcoded for service-to-service communication)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      # Container paths (hardcoded for internal use)
      - MODELS_DIRECTORY=/app/models
      - MODEL_BASE_DIR=/app/models
      - TEMP_DIR=/app/temp
      # Version passed as env var (avoids file bind-mount conflicts in dev mode)
      - APP_VERSION
    healthcheck:
      # --connect-timeout 2 --max-time 4 makes curl fail FAST (exit 7) when the
      # backend isn't listening yet, instead of hanging until docker kills it
      # with exit -1 "Health check exceeded timeout". The timeout-kill exit
      # path is mis-handled by compose's dependency tracker during start_period
      # and was causing "dependency failed to start: container is unhealthy"
      # errors even with start_period=600s. Clean exit 7 is treated correctly
      # as a "not ready yet" signal while the container is still in start_period.
      test: ["CMD", "curl", "-sf", "--connect-timeout", "2", "--max-time", "4", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      # start_period must be long enough to cover the worst-case startup:
      #   - Alembic running 45+ migrations against a populated v0.3.x → 0.4.x
      #     upgrade DB (can take 2-5 min on cold caches and slow disks)
      #   - PyAnnote model warm preload (15-30s)
      #   - OpenSearch neural ML model deploy (10-20s)
      #   - Cold sentence-transformers / HF model download on first run
      # 300s was insufficient on release-test Scenario B (v0.3.3 → 0.4.0 upgrade
      # with full migration chain); dependent services (celery workers, frontend)
      # were skipped because compose gave up waiting on backend. 600s gives real
      # users doing their first in-place upgrade enough headroom while still
      # failing fast on a genuinely broken backend.
      start_period: 600s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  celery-worker:
    container_name: opentranscribe-celery-worker
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    command: celery -A app.core.celery worker --loglevel=info -Q gpu --pool=${GPU_WORKER_POOL:-threads} --concurrency=${GPU_CONCURRENT_REQUESTS:-1} --max-tasks-per-child=${GPU_MAX_TASKS:-100000} --hostname gpu-transcription@%h -E
    # GPU configuration is provided by docker-compose.gpu.yml overlay
    # when NVIDIA GPU is detected (automatically handled by opentr.sh)
    # This allows the base file to work on macOS and CPU-only Linux systems
    volumes:
      # Model cache directories - must be owned by UID 1000 on host
      - ${MODEL_CACHE_DIR:-./models}/huggingface:/home/appuser/.cache/huggingface
      - ${MODEL_CACHE_DIR:-./models}/torch:/home/appuser/.cache/torch
      - ${MODEL_CACHE_DIR:-./models}/nltk_data:/home/appuser/.cache/nltk_data
      - ${MODEL_CACHE_DIR:-./models}/sentence-transformers:/home/appuser/.cache/sentence-transformers
    environment:
      # Internal Docker network settings (same as backend)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - MODELS_DIRECTORY=/app/models
      - MODEL_BASE_DIR=/app/models
      - TEMP_DIR=/app/temp
      # Per-container batch size override (default worker is typically a smaller GPU)
      - BATCH_SIZE=${GPU_DEFAULT_BATCH_SIZE:-auto}
      # Signal to celery.py preload_models() that this is a GPU worker.
      # Without this, ALL workers preload Whisper + PyAnnote onto GPU (~15GB wasted).
      - PRELOAD_GPU_MODELS=true
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping -d gpu-transcription@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-download-worker:
    container_name: opentranscribe-celery-download-worker
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    command: celery -A app.core.celery worker --loglevel=info -Q download --concurrency=${DOWNLOAD_CONCURRENCY:-3} --max-tasks-per-child=${DOWNLOAD_MAX_TASKS:-10} --hostname media-downloader@%h -E
    volumes:
      - ${MODEL_CACHE_DIR:-./models}/huggingface:/home/appuser/.cache/huggingface
      - ${MODEL_CACHE_DIR:-./models}/torch:/home/appuser/.cache/torch
    environment:
      # Internal Docker network settings (same as backend)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - TEMP_DIR=/app/temp
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping -d media-downloader@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-cpu-worker:
    container_name: opentranscribe-celery-cpu-worker
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    # Compute-bound queues only. cloud-asr runs on its own container
    # (celery-cloud-asr-worker) so long-running network-bound cloud
    # transcription tasks cannot head-of-line-block postprocess.
    command: celery -A app.core.celery worker --loglevel=info -Q cpu,utility,cpu-transcribe --concurrency=${CPU_WORKER_CONCURRENCY:-8} --max-tasks-per-child=20 --hostname cpu-processor@%h -E
    environment:
      - PRELOAD_CPU_WHISPER=true
      # Internal Docker network settings (same as backend)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - TEMP_DIR=/app/temp
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping -d cpu-processor@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-cloud-asr-worker:
    # Dedicated worker for cloud ASR provider tasks (Deepgram, AssemblyAI,
    # Google, AWS, etc.). These are long-running network-bound jobs; giving
    # them their own pool with higher concurrency avoids them blocking the
    # latency-sensitive postprocess / waveform / utility work on the main
    # CPU worker. Phase 2 of the timing audit plan — item 17.
    container_name: opentranscribe-celery-cloud-asr-worker
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    command: celery -A app.core.celery worker --loglevel=info -Q cloud-asr --concurrency=${CLOUD_ASR_CONCURRENCY:-16} --max-tasks-per-child=50 --hostname cloud-asr@%h -E
    environment:
      # Internal Docker network settings (same as backend)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - TEMP_DIR=/app/temp
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping -d cloud-asr@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-nlp-worker:
    container_name: opentranscribe-celery-nlp-worker
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    command: celery -A app.core.celery worker --loglevel=info -Q nlp,celery --concurrency=${NLP_CONCURRENCY:-4} --max-tasks-per-child=${NLP_MAX_TASKS:-50} --hostname ai-nlp@%h -E
    volumes:
      - ${MODEL_CACHE_DIR:-./models}/nltk_data:/home/appuser/.cache/nltk_data
    environment:
      # Internal Docker network settings (same as backend)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - TEMP_DIR=/app/temp
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping -d ai-nlp@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - postgres
      - redis
      - minio
      - opensearch

  celery-embedding-worker:
    container_name: opentranscribe-celery-embedding-worker
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    # Dedicated embedding worker: concurrency=1 keeps one model loaded in memory.
    # Same pattern as GPU worker - sequential processing, model stays warm.
    # High max-tasks-per-child avoids model reload overhead.
    command: celery -A app.core.celery worker --loglevel=info -Q embedding --concurrency=1 --max-tasks-per-child=500 --hostname search-indexer@%h -E
    volumes:
      - ${MODEL_CACHE_DIR:-./models}/sentence-transformers:/home/appuser/.cache/sentence-transformers
    environment:
      # Internal Docker network settings (same as backend)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - TEMP_DIR=/app/temp
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping -d search-indexer@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    container_name: opentranscribe-celery-beat
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    command: celery -A app.core.celery beat --loglevel=info
    environment:
      # Internal Docker network settings (same as backend)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - TEMP_DIR=/app/temp
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import os,time; exit(0 if os.path.exists(\"/app/celerybeat-schedule\") and time.time()-os.path.getmtime(\"/app/celerybeat-schedule\")<300 else 1)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  # GPU Scaled Worker - Base definition
  # Activated only with --gpu-scale flag via docker-compose.gpu-scale.yml overlay
  # GPU configuration (deploy.resources.reservations) is provided by gpu-scale.yml
  # Image/build/volumes provided by override.yml (dev) or prod.yml/offline.yml
  celery-worker-gpu-scaled:
    container_name: ${COMPOSE_PROJECT_NAME:-opentranscribe}-celery-worker-gpu-scaled
    profiles:
      - gpu-scale  # Only activated with --gpu-scale flag
    scale: 0  # Disabled by default, gpu-scale.yml sets scale: 1
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    environment:
      # Internal Docker network settings (same as other workers)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - MODELS_DIRECTORY=/app/models
      - MODEL_BASE_DIR=/app/models
      - TEMP_DIR=/app/temp
    tmpfs:
      - /app/temp:noexec,nosuid,size=20g,mode=1777
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    container_name: opentranscribe-frontend
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    # Note: ports, healthcheck, and NODE_ENV defined in override files (dev vs prod)
    depends_on:
      backend:
        condition: service_healthy

  flower:
    container_name: opentranscribe-flower
    restart: always
    env_file: .env
    security_opt:
      - no-new-privileges:true
    command: >
      python -m celery -A app.core.celery flower
      --port=5555
      --url_prefix=${FLOWER_URL_PREFIX:-flower}
      --persistent=True
      --db=/app/flower.db
      --broker=redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
      --max_tasks=10000
      --natural_time=True
      --auto_refresh=True
      --tasks_columns=name,uuid,state,received,started,runtime,worker,args
      --purge_offline_workers=600
      --queues=gpu,download,cpu,nlp,embedding,utility,cloud-asr,cpu-transcribe,celery
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-flower}
    ports:
      - "${FLOWER_PORT:-5175}:5555"
    environment:
      - CELERY_BROKER_URL=redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
      - FLOWER_USER=${FLOWER_USER:-admin}
      - FLOWER_PASSWORD=${FLOWER_PASSWORD:-flower}
      - TEMP_DIR=/app/temp
    depends_on:
      - redis
      - celery-worker
    volumes:
      # Flower only needs persistent database for monitoring, not AI models
      - flower_data:/app

  docs:
    container_name: opentranscribe-docs
    restart: always
    security_opt:
      - no-new-privileges:true
    # image, build, ports defined in override files (dev vs prod)
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/docs/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  minio_data:
  redis_data:
  opensearch_data:
  flower_data:

networks:
  default:
    driver: bridge
