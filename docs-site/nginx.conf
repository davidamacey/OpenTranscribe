server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Enable gzip compression for text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Internally rewrite bare root to /docs/ (direct container access on port 5183)
    # Uses internal rewrite (not redirect) so the port in the URL is preserved.
    location = / {
        rewrite ^ /docs/ last;
    }

    # SPA fallback: serve index.html for unknown paths (Docusaurus client-side routing)
    location / {
        try_files $uri $uri/index.html /index.html;
    }

    # Redirect /docs (no trailing slash) to /docs/ for direct container access
    location = /docs {
        return 301 /docs/;
    }

    # ^~ prevents regex locations from intercepting /docs/* before the rewrite runs.
    # /docs/ (exact) serves index.html directly via break to avoid looping with location = /.
    # /docs/<path> strips the prefix and re-processes via last.
    location ^~ /docs/ {
        rewrite ^/docs/$ /index.html break;
        rewrite ^/docs/(.+)$ /$1 last;
    }

    # Cache static assets aggressively (Docusaurus uses content hashes in filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Never cache HTML (allows doc updates to be seen immediately)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
