# docker-compose.bench.yml
# Benchmark isolation overlay — replaces ALL persistent storage with fresh named volumes
# and builds backend/frontend images from local source (no live code mounts).
#
# Purpose: A/B upload-speed benchmarks that must never touch the NAS dataset
# (postgres, MinIO, OpenSearch, Redis).  Use this instead of docker-compose.nas.yml.
#
# IMPORTANT: Do NOT combine with docker-compose.override.yml — the override mounts
# ./backend:/app which makes the running code track the current git branch, not the
# branch that was built.  The bench stack must use the built image to stay on the
# branch that was checked out when `docker compose build` ran.
#
# Usage (master baseline):
#   git checkout master
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml \
#     -f docker-compose.bench.yml up -d --build
#
# Usage (branch after):
#   git checkout feat/upload-speed-improvement
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml \
#     -f docker-compose.bench.yml down -v
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml \
#     -f docker-compose.bench.yml up -d --build
#
# The NAS bind mounts in docker-compose.nas.yml are NOT loaded here, so the
# production dataset is completely isolated from these runs.

services:
  # Build backend image from local source — no live source mounts so the branch
  # used at build time is frozen into the image.
  # pull_policy: never prevents Docker from trying to pull opentranscribe-backend:bench
  # from Docker Hub (it's a local-only tag).
  backend:
    image: opentranscribe-backend:bench
    pull_policy: never
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    volumes:
      - ${MODEL_CACHE_DIR:-./models}/sentence-transformers:/home/appuser/.cache/sentence-transformers
      - ${MODEL_CACHE_DIR:-./models}/nltk_data:/home/appuser/.cache/nltk_data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080

  celery-worker:
    image: opentranscribe-backend:bench
    pull_policy: never
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    volumes:
      - ${MODEL_CACHE_DIR:-./models}/huggingface:/home/appuser/.cache/huggingface
      - ${MODEL_CACHE_DIR:-./models}/torch:/home/appuser/.cache/torch
      - ${MODEL_CACHE_DIR:-./models}/nltk_data:/home/appuser/.cache/nltk_data
      - ${MODEL_CACHE_DIR:-./models}/sentence-transformers:/home/appuser/.cache/sentence-transformers
      - ./benchmark/test_audio:/app/benchmark/test_audio:ro

  celery-download-worker:
    image: opentranscribe-backend:bench
    pull_policy: never
    volumes:
      - ${MODEL_CACHE_DIR:-./models}/huggingface:/home/appuser/.cache/huggingface
      - ${MODEL_CACHE_DIR:-./models}/torch:/home/appuser/.cache/torch

  celery-cpu-worker:
    image: opentranscribe-backend:bench
    pull_policy: never

  celery-cloud-asr-worker:
    image: opentranscribe-backend:bench
    pull_policy: never

  celery-nlp-worker:
    image: opentranscribe-backend:bench
    pull_policy: never

  celery-embedding-worker:
    image: opentranscribe-backend:bench
    pull_policy: never
    volumes:
      - ${MODEL_CACHE_DIR:-./models}/sentence-transformers:/home/appuser/.cache/sentence-transformers

  celery-beat:
    image: opentranscribe-backend:bench
    pull_policy: never

  flower:
    image: opentranscribe-backend:bench
    pull_policy: never
    volumes:
      - flower_bench_data:/app

  frontend:
    image: opentranscribe-frontend:bench
    pull_policy: never
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "${FRONTEND_PORT:-5173}:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  docs:
    image: opentranscribe-docs:bench
    pull_policy: never
    build:
      context: ./docs-site
      dockerfile: Dockerfile
    ports:
      - "${DOCS_PORT:-5183}:8080"

  postgres:
    volumes:
      - postgres_bench_data:/var/lib/postgresql/data/

  minio:
    volumes:
      - minio_bench_data:/data

  redis:
    volumes:
      - redis_bench_data:/data

  opensearch:
    volumes:
      - opensearch_bench_data:/usr/share/opensearch/data
      - ${MODEL_CACHE_DIR:-./models}/opensearch-ml:/ml-models:ro

volumes:
  postgres_bench_data:
  minio_bench_data:
  redis_bench_data:
  opensearch_bench_data:
  flower_bench_data:
