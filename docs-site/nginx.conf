server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Enable gzip compression for text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # SPA fallback: serve index.html for unknown paths (Docusaurus client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Docusaurus uses content hashes in filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Never cache HTML (allows doc updates to be seen immediately)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
