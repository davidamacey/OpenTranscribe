# Nginx configuration for PKI development testing
#
# This enables mutual TLS (mTLS) for testing PKI authentication with browsers.
#
# Usage:
#   1. Generate server certificate (or use self-signed for dev):
#      openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#        -keyout test-certs/nginx/server.key \
#        -out test-certs/nginx/server.crt \
#        -subj "/CN=localhost"
#
#   2. Run nginx with this config:
#      nginx -c /path/to/nginx-pki-dev.conf
#
#   3. Access https://localhost:8443 (accept self-signed cert warning)
#
#   4. Import a .p12 client certificate into your browser
#
#   5. Click "Sign in with Certificate" - browser will prompt for cert selection

worker_processes 1;
error_log /tmp/nginx-pki-error.log debug;
pid /tmp/nginx-pki.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /tmp/nginx-pki-access.log;

    # Upstream backends
    upstream frontend {
        server 127.0.0.1:5173;
    }

    upstream backend {
        server 127.0.0.1:8080;
    }

    # HTTPS server with mutual TLS
    server {
        listen 8443 ssl;
        server_name localhost;

        # Server certificate (self-signed for dev)
        ssl_certificate test-certs/nginx/server.crt;
        ssl_certificate_key test-certs/nginx/server.key;

        # Client certificate verification
        ssl_client_certificate test-certs/ca/ca.crt;
        ssl_verify_client optional;  # Don't require cert for all pages
        ssl_verify_depth 2;

        # TLS settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # PKI authentication endpoint - pass certificate info to backend
        location /api/auth/pki {
            # Pass certificate info via headers
            proxy_set_header X-Client-Cert $ssl_client_escaped_cert;
            proxy_set_header X-Client-Cert-Verify $ssl_client_verify;
            proxy_set_header X-Client-Cert-DN $ssl_client_s_dn;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Regular API routes (no mTLS required)
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket for Vite HMR
        location /@vite/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Frontend (Vite dev server)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
